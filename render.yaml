services:
  - type: web
    name: fantasyworld
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile --prod=false && pnpm build && pnpm check:render
    startCommand: pnpm db:migrate && pnpm --filter @fantasy-world/api start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 24.16.0
      - key: DATABASE_URL
        fromDatabase:
          name: fantasyworld-db
          property: connectionString
      - key: SESSION_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
databases:
  - name: fantasyworld-db
    plan: free
