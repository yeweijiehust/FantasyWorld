services:
  - type: web
    name: fantasyworld
    runtime: node
    plan: starter
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm --filter @fantasy-world/api start
    preDeployCommand: pnpm db:migrate
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fantasyworld-db
          property: connectionString
      - key: SESSION_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
databases:
  - name: fantasyworld-db
    plan: free
