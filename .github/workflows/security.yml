name: security

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/dependency-review-action@v5
  repository-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: |
          test ! -f .env
          ! git ls-files | grep -E '(^|/)\.env($|\.)'
          ! git grep -I -n -E 'sk-[A-Za-z0-9_-]{20,}|BEGIN (RSA|OPENSSH) PRIVATE KEY' -- .
