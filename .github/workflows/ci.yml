name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: fantasyworld
          POSTGRES_PASSWORD: fantasyworld
          POSTGRES_DB: fantasyworld
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fantasyworld -d fantasyworld" --health-interval 10s --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://fantasyworld:fantasyworld@localhost:5432/fantasyworld
      SESSION_SECRET: ci-session-secret-ci-session-secret
      ENCRYPTION_KEY: ci-encryption-key
      ADMIN_PASSWORD_HASH: ""
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migrate
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
